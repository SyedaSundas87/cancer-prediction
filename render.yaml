services:
  - type: web
    name: cancer-prediction-api
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0

  - type: web
    name: cancer-risk-frontend
    env: static
    buildCommand: "cd cancer-risk-predictor && npm install && npm run build"
    staticPublishPath: "./cancer-risk-predictor/dist"
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: cancer-prediction-api
          envVarKey: RENDER_EXTERNAL_URL
